# Fly.io deployment for the remote MCP server. Set secrets before deploying (see
# packages/collections-mcp/README.md). Deploys automatically on push to main via
# .github/workflows/ci.yml (needs a FLY_API_TOKEN repo secret).
app = "balyoo"
primary_region = "fra"

[build]

[env]
  # COLLECTIONS_MCP_TOKEN (the bearer secret) is set via `fly secrets set`.
  # For ChatGPT/Claude.ai custom connectors (which require a real OAuth flow, not
  # a bare token), also set COLLECTIONS_MCP_OAUTH_CLIENT_ID/_CLIENT_SECRET/
  # _REDIRECT_URIS and COLLECTIONS_MCP_PUBLIC_URL — see
  # packages/collections-mcp/README.md.

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the single machine warm instead of scaling to zero. This app can only
  # ever run one machine (the SQLite volume below mounts to exactly one), so
  # scale-to-zero saves almost nothing but forces a cold start on every request
  # after idle. Those cold starts route through Fly's Machines API to auto-start
  # the stopped machine, which regularly hits `[PM01] machines API returned an
  # error: "rate limit exceeded"` and then retries with backoff — leaving the
  # server unreachable for up to ~5 minutes. Staying always-on avoids the
  # start call entirely. auto_start is kept as a safety net in case the machine
  # ever does stop (e.g. after a crash or manual stop).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# Durable storage for the SQLite database; mounted at /data, used as
# /data/collections.db. A Fly volume can only be attached to one machine at a time,
# so the read-only public REST API (served at /collections, see the Dockerfile's
# --rest flag) runs in this same container rather than a separate app.
[[mounts]]
  source = "collections_data"
  destination = "/data"
