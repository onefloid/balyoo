# Fly.io deployment for the remote MCP server. Rename `app` and set secrets before
# deploying (see packages/collections-mcp/README.md).
app = "collections-mcp"
primary_region = "fra"

[build]

[env]
  COLLECTIONS_MCP_WRITE_SCOPE = "collections:write"
  # COLLECTIONS_MCP_ISSUER / _RESOURCE_URL / _AUDIENCE are set via `fly secrets set`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Liveness check against the public /health endpoint.
  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

# Durable storage for the SQLite database; mounted at /data, used as
# /data/collections.db. Create it before the first deploy so Fly does not
# auto-create (and possibly duplicate) it:
#   fly volumes create collections_data --region <region> --size 1
[[mounts]]
  source = "collections_data"
  destination = "/data"
