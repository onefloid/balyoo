[project]
name = "collections-chat"
version = "0.1.0"
description = "Owner-facing in-app chat: an Anthropic tool-use loop over CollectionsService, exposed as an SSE endpoint."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
    "collections-mcp",
    "anthropic>=0.40",
    "starlette",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_chat"]

[tool.uv.sources]
collections-core = { workspace = true }
collections-mcp = { workspace = true }
