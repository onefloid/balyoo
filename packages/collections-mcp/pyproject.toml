[project]
name = "collections-mcp"
version = "0.2.0"
description = "Auto-generated MCP server for the Collections platform."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
    "collections-rest",
    "mcp>=1.2",
    "starlette>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_mcp"]

[tool.uv.sources]
collections-core = { workspace = true }
collections-rest = { workspace = true }
