[project]
name = "collections-rest"
version = "0.1.0"
description = "Generic, schema-driven REST API for the Collections platform."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
    "fastapi>=0.110",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_rest"]

[tool.uv.sources]
collections-core = { workspace = true }
