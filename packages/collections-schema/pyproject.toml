[project]
name = "collections-schema"
version = "0.1.0"
description = "JSON Schema validation for the Collections platform."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
    "jsonschema>=4.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_schema"]

[tool.uv.sources]
collections-core = { workspace = true }
