[project]
name = "collections-core"
version = "0.1.0"
description = "Business logic and interfaces for the Collections platform (backend-agnostic)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_core"]
