[project]
name = "collections-filesystem"
version = "0.1.0"
description = "Filesystem storage provider for the Collections platform."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_filesystem"]

[tool.uv.sources]
collections-core = { workspace = true }
