[project]
name = "collections-static"
version = "0.1.0"
description = "Static site generator for the Collections platform (read-only, server-less)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "collections-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collections_static"]

[tool.uv.sources]
collections-core = { workspace = true }
