name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/collections-ui/pnpm-lock.yaml
      - name: Sync Python workspace
        run: uv sync
      - name: Install UI dependencies
        run: pnpm --dir packages/collections-ui install --frozen-lockfile
      - name: Build UI
        run: pnpm --dir packages/collections-ui build
      - name: Assemble site (UI bundle + JSON mirror + config.json)
        # --live-url points the UI at the fly.io REST API by default while keeping
        # the exported api/ mirror as an automatic fallback (dual mode). The
        # trailing slash is load-bearing: the client resolves routes via
        # new URL("collections", apiBase).
        run: |
          rm -rf dist
          mkdir dist
          cp -r packages/collections-ui/dist/. dist/
          uv run collections export --root examples/collections --out dist \
            --live-url https://balyoo.fly.dev/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
