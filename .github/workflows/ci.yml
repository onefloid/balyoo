name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync workspace
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest -q

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/collections-ui
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/collections-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deploy:
    needs: python
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    env:
      # Pin a flyctl version for reproducible deploys, e.g. "v0.3.0"; leave empty
      # to track the latest release. (The install/deploy steps below fetch from
      # fly.io directly and retry, rather than the setup-flyctl action whose one-shot
      # download of the binary intermittently failed with ECONNRESET.)
      FLYCTL_VERSION: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl (retry on transient network errors)
        run: |
          install_flyctl() {
            if [ -n "$FLYCTL_VERSION" ]; then
              curl -fsSL https://fly.io/install.sh | sh -s "$FLYCTL_VERSION"
            else
              curl -fsSL https://fly.io/install.sh | sh
            fi
          }
          for attempt in 1 2 3 4 5; do
            if install_flyctl; then
              echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
              exit 0
            fi
            echo "flyctl install attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "flyctl install failed after 5 attempts" >&2
          exit 1
      - name: Deploy to Fly.io (retry on transient network errors)
        run: |
          for attempt in 1 2 3; do
            if flyctl deploy --remote-only; then
              exit 0
            fi
            echo "deploy attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          echo "deploy failed after 3 attempts" >&2
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
